services:
  - type: web
    name: eleitora-backend
    runtime: python
    pythonVersion: "3.11"
    plan: free

    # Build command - install dependencies in correct order
    buildCommand: |
      set -e
      echo "Step 1: Upgrading pip..."
      pip install --upgrade pip setuptools wheel

      echo "Step 2: Installing pdfplumber (critical dependency)..."
      pip install --no-cache-dir pdfplumber==0.11.9

      echo "Step 3: Installing all other dependencies from requirements.txt..."
      pip install --no-cache-dir -r backend/requirements.txt

      echo "Step 4: Verifying critical modules can be imported..."
      python -c "import pdfplumber; print('✓ pdfplumber imported successfully')"
      python -c "from tse_import import TSEImportManager; print('✓ TSEImportManager imported successfully')"

      echo "All dependencies installed and verified!"

    # Start command - run the FastAPI server
    startCommand: "cd backend && uvicorn server:app --host 0.0.0.0 --port 10000"

    # Environment variables
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "10000"

    # Disk usage
    disk:
      - mountPath: /data
        sizeGB: 1
