services:
  - type: web
    name: eleitora-backend
    env: python
    pythonVersion: 3.11
    buildCommand: cd backend && pip install --no-cache-dir -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: PYTHONPATH
        value: /var/task/backend
